# /etc/tlp.d/01-rip.conf
# ThinkPad T450 — i5-5300U Broadwell, 16GB DDR3, SSD, dual battery
# TLP 1.8.0 drop-in — pentesting workstation profile
# Applied by: install.sh -system

# ---------------------------------------------------------------------------
# CPU Governor
# intel_cpufreq passive mode: only 'performance' and 'schedutil' available.
# AC: performance = no governor ramp latency for JVM/crypto/scanner bursts.
# BAT: schedutil = intelligent frequency scaling based on scheduler load.
# ---------------------------------------------------------------------------
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=schedutil

# Energy Performance Bias (MSR): hints to hardware P-state selection.
# performance = EPB 0 (full speed); balance_power = EPB 8.
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# Keep turbo boost on in both modes (boost to 2.9 GHz).
# thermald handles thermal limits; disabling boost hurts JVM/crypto tools.
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1

# Disable NMI watchdog: frees one PMU counter on Broadwell (limited to 4).
NMI_WATCHDOG=0

# ---------------------------------------------------------------------------
# Battery Charge Thresholds (natacpi confirmed active on both batteries)
#
# BAT0 = SONY 45N1111 (internal 3-cell, 23.2Wh design, ~57% health / 13.3Wh)
#   Storage range 40/80: mostly-plugged-in use, protect remaining cell health.
#
# BAT1 = SANYO 45N1734 (slice, 47.5Wh design, ~66% health / 31.3Wh)
#   Higher range 75/95: runtime reserve battery, keep ready for mobile use.
# ---------------------------------------------------------------------------
START_CHARGE_THRESH_BAT0=40
STOP_CHARGE_THRESH_BAT0=80

START_CHARGE_THRESH_BAT1=75
STOP_CHARGE_THRESH_BAT1=95

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------

# Full SATA link performance on AC.
# Default med_power_with_dipm adds brief re-link latency; unnecessary on AC.
SATA_LINKPWR_ON_AC=max_performance
# On battery, device-initiated power management saves real power.
SATA_LINKPWR_ON_BAT=med_power_with_dipm

# SSD: no APM power management on AC.
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"

# Never change I/O scheduler — mq-deadline already set via udev.
DISK_IOSCHED="keep keep"

# ---------------------------------------------------------------------------
# PCIe ASPM
# AC: performance = disable ASPM link transitions (no NIC/SSD latency spikes).
# BAT: let kernel manage ASPM normally.
# ---------------------------------------------------------------------------
PCIE_ASPM_ON_AC=performance
PCIE_ASPM_ON_BAT=default

# ---------------------------------------------------------------------------
# USB
# Disable autosuspend entirely.
# Pentesting USB devices (Alfa adapters, hardware tokens, RTL-SDR, USB-serial)
# must not lose device handles mid-engagement. Power saving is milliwatts.
# ---------------------------------------------------------------------------
USB_AUTOSUSPEND=0

# ---------------------------------------------------------------------------
# WiFi power management
# ---------------------------------------------------------------------------
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# ---------------------------------------------------------------------------
# Audio
# Disable power-save on AC: eliminates audible pop/click on audio wake-up.
# (Default 1s timeout = pop every time audio is idle for 1 second on AC.)
# ---------------------------------------------------------------------------
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# ---------------------------------------------------------------------------
# Runtime PM driver denylist
# Prevents e1000e (I218-LM ethernet) and iwlwifi (AC 7265) from runtime
# suspending on AC — keeps NIC always ready for scanning/proxy workloads.
# xhci_hcd: USB host controller must not suspend (defense in depth with USB_AUTOSUSPEND=0).
# ---------------------------------------------------------------------------
RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon xhci_hcd e1000e iwlwifi"
