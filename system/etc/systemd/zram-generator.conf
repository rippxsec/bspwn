# /etc/systemd/zram-generator.conf
# Applied by: install.sh -system
#
# Small zram swap buffer — absorbs anonymous page bursts before SSD swap.
# T450: 16GB DDR3, zstd achieves ~400MB/s compression on Broadwell (2-3:1 ratio).
# Priority 100 > LVM swap (default priority -2): zram is used first.
#
# 2GB fixed (not ram/2): enough to absorb burst pressure without wasting RAM.
# With swappiness=10 and earlyoom running, this device will rarely be touched.

[zram0]
zram-size = 2048
compression-algorithm = zstd
swap-priority = 100
