# /etc/sysctl.d/99-rip.conf
# T450 i5-5300U / 16GB DDR3 / SSD / LUKS / pentesting workstation
# Applied by: install.sh -system

# ---------------------------------------------------------------------------
# VM / Memory
# ---------------------------------------------------------------------------

# Prefer reclaiming page cache over swapping anonymous pages.
# 16GB RAM means swap should only engage under genuine pressure.
vm.swappiness = 10

# Start background writeback at 5% dirty (~800MB on 16GB).
# Default 10% = 1.6GB can accumulate — causes large burst writes through LUKS/LVM.
vm.dirty_background_ratio = 5

# Block processes if 10% of RAM (~1.6GB) is dirty (default 20% = 3.2GB stall).
vm.dirty_ratio = 10

# Write out pages dirty for > 10s (default 15s).
vm.dirty_expire_centisecs = 1000

# Run writeback flusher every 5s (default 15s).
# Keeps dirty footprint small; avoids large burst writes under LUKS encryption.
vm.dirty_writeback_centisecs = 500

# Retain inode/dentry cache more aggressively than page cache (default 100).
# Pentesting tools open thousands of small files; warm inode cache reduces re-reads.
vm.vfs_cache_pressure = 50

# Reserve 128MB free for OOM handling and earlyoom headroom (default ~66MB).
# Prevents OOM deadlock when memory is tight.
vm.min_free_kbytes = 131072

# ---------------------------------------------------------------------------
# Filesystem / inotify
# ---------------------------------------------------------------------------

# 512K inotify watches (default ~125K).
# Burp Suite, Java tools, Obsidian, gobuster, and file watchers exhaust defaults.
fs.inotify.max_user_watches = 524288

# 512 inotify instances per user (default 128).
# Multiple concurrent tools each spawn inotify instances.
fs.inotify.max_user_instances = 512

# ---------------------------------------------------------------------------
# Kernel / Profiling
# ---------------------------------------------------------------------------

# Allow unprivileged perf events (default 3 = fully locked on Debian hardened).
# 1 = perf_events usable without root; enables perf, bpftrace, flamegraph, BCC.
kernel.perf_event_paranoid = 1

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------

# 16MB socket buffer ceiling (default ~208KB).
# Required for Burp proxy intercepting large responses, VPN tunnels, wget.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# TCP buffer auto-tuning: min / default / max (max raised to match above).
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Per-CPU NIC receive queue depth (default 1000).
# nmap/masscan receive thousands of RST/ICMP replies per second — 1000 drops packets.
net.core.netdev_max_backlog = 5000

# Expand ephemeral port range from ~28K to 64K ports.
# Prevents EADDRINUSE during aggressive scanning and large Metasploit handler pools.
net.ipv4.ip_local_port_range = 1024 65535

# Enable TCP Fast Open for both client and server (default 1 = client only).
net.ipv4.tcp_fastopen = 3

# Do not reset congestion window after idle (default 1).
# Burp proxy, SSH tunnels, and scanning tools burst traffic intermittently.
net.ipv4.tcp_slow_start_after_idle = 0
